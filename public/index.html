<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <!-- <link rel="icon" href="<%= BASE_URL %>favicon.ico"> -->
    <meta name="twitter:card" content="summary" />
    <meta property="og:url" content="https://github.com/gitcobra/avif2jpeg/" />
    <meta property="og:title" content="AVIF to JPEG 'Offline' Converter" />
    <meta property="og:description" content="It is a web application to convert AVIF images to other common image formats such as JPEG or PNG offline" />
    <meta property="og:image" content="./card.jpg" />
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app">
      <script>
        (function(){
          var disclaimer = document.createElement('div');
          var app = document.getElementById('app');
          app.appendChild(disclaimer);
          addEventListener('load', function(){
            setTimeout(function(){
              if( app.contains(disclaimer) ) {
                disclaimer.innerHTML =
                  '<p>If you can still see this text even after reloading, perhaps this page does not support your web browser.</p>'+
                  '<p>Please use latest version of Firefox or Chrome.</p>';
              }
              app = null;
              disclaimer = null;
            }, 1000);
          });
        })();
      </script>
    </div>

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T9YF63PVEL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-T9YF63PVEL');
    </script>

    <!-- built files will be auto injected -->
  </body>
</html>
